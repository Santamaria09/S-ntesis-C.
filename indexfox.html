<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva y Pago</title>
    <link rel="icon" type="image/x-icon" href=""> <!--aqui va el icono-->

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f3057, #0a7c85, #00b894);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-spa {
            width: 100%;
            max-width: 800px;
            border: none;
            border-radius: 20px;
            padding: 30px;
        }

        h2 {
            color: #008891;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-main {
            background: #00b894;
            color: white;
            border-radius: 30px;
            padding: 8px 25px;
            transition: 0.3s;
        }

        .btn-main:hover {
            background: #019875;
            transform: scale(1.05);
        }

        .btn-secondary-custom {
            background: #0f3057;
            color: white;
            border-radius: 30px;
            padding: 8px 25px;
        }

        .btn-back {
    background: #0f3057;
    color: white;
    border: none;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    font-size: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.btn-back:hover {
    background: #008891;
    transform: scale(1.1);
}

        input, select {
            border-radius: 10px !important;
        }
    </style>
</head>

<body>

<div class="card card-spa shadow-lg bg-white">
    <!--RESERVA-->
    <section id="reserva">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn-back" onclick="regresarPagina()">←</button>
        <h2 class="text-center flex-grow-1">Datos de Reserva</h2>
    </div>


        <div class="row g-4">

            <div class="col-md-6">
                <label class="form-label">Nombre del Hotel</label>
                <input type="text" id="hotel" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Precio por noche ($)</label>
                <input type="text" id="precioNoche" class="form-control" value="50" readonly>
            </div>

            <div class="col-md-6">
                <label class="form-label">Fecha entrada</label>
                <input type="date" id="entrada" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Fecha salida</label>
                <input type="date" id="salida" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Tipo de habitación</label>
                <select id="habitacion" class="form-select">
                    <option value="25">1 persona</option>
                    <option value="40">Habitacion matrimonial</option>
                    <option value="50">Familiar</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Total ($)</label>
                <input type="text" id="total" class="form-control" readonly>
            </div>

            <div class="col-12 text-center mt-3">
                <button class="btn btn-secondary-custom me-2" onclick="calcularTotal()">
                    Calcular Total
                </button>
                <button class="btn btn-main" onclick="irAPago()">
                    Continuar a Pago
                </button>
            </div>

        </div>
    </section>

    <!--PAGO-->
    <section id="pago" style="display:none;">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn-back" onclick="volverAReserva()">←</button>
            <h2 class="text-center flex-grow-1">Datos de Método de Pago</h2>
        </div>

        <div class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Nombre del cliente</label>
                <input type="text" id="nombre" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Método de pago</label>
                <select id="metodo" class="form-select">
                    <option value="credito">Crédito</option>
                    <option value="debito">Débito</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Número de tarjeta</label>
                <input type="text" id="tarjeta" class="form-control">
            </div>

            <div class="col-md-3">
                <label class="form-label">CVV</label>
                <input type="text" id="cvv" class="form-control">
            </div>

            <div class="col-12 text-center mt-3">
                <button class="btn btn-main" onclick="confirmarPago()">
                    Confirmar Pago
                </button>
            </div>

        </div>
    </section>

    <!--CONFIRMACION-->
    <section id="confirmacion" style="display:none;" class="text-center">

        <h2 class="text-success">Reserva Confirmada</h2>
        <p id="mensajeFinal" class="fs-5"></p>

    </section>

</div>

<script>
    function volverAReserva() {
        document.getElementById("pago").style.display = "none";
        document.getElementById("reserva").style.display = "block";
    }
</script>

<script src="app.js"></script>

</body>
</html>
